<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>

    <h2>Enter marks:</h2>
    <input type="number" id="s1" placeholder="Enter marks of subject1"> <br>
    <input type="number" id="s2" placeholder="Enter marks of subject2"> <br>
    <input type="number" id="s3" placeholder="Enter marks of subject3"> <br>
    <input type="number" id="s4" placeholder="Enter marks of subject4"> <br>
    <input type="number" id="s5" placeholder="Enter marks of subject5"> <br>
    <button onclick="calculate()">Calculate</button>
    <div id="result">0</div>

    <script>
        function calculate(){
            let m1 = parseFloat(document.getElementById("s1").value);
            let m2 = parseFloat(document.getElementById("s2").value);
            let m3 = parseFloat(document.getElementById("s3").value);
            let m4 = parseFloat(document.getElementById("s4").value);
            let m5 = parseFloat(document.getElementById("s5").value);

            if( isNaN(m1) || isNaN(m2) || isNaN(m3) || isNaN(m4) || isNaN(m5)){
                document.getElementById("result").innerText = "Please enter marks of all subjects.";
                return;
            }

            let total= m1 + m2 + m3 + m4 + m5;
            let percentage = (total/500)*100;

            let grade = "";
            if(percentage > 90){
                grade = 'A+';
            }
            else if(percentage > 80){
                grade = 'B';
            }
            else if(percentage > 70){
                grade = 'C';
            }
            else if(percentage > 60){
                grade = 'D';
            }
            else{
                grade = "F";
            }

            document.getElementById("result").innerHTML = `
                      Total Marks: ${total}  <br>
                      Percentage: ${percentage}%<br>
                      grade: ${grade}`
                      ;

        }
    </script>

    
</body>
</html>
